<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kategori Tokoh</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
</head>
<body>
    <main class="container" style="margin-top: 30px;">
        <h1 id="catTitle">Memuat Kategori...</h1>
        <div id="catResults" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;"></div>
    </main>

    <script type="module">
        import { supabase } from './admin/script/supabase.js';

        // Mengambil parameter '?name=...' dari URL
        const params = new URLSearchParams(window.location.search);
        const categoryName = params.get('name') || 'Semua';

        document.getElementById('catTitle').innerText = `Kategori: ${categoryName}`;

        async function loadCategory() {
            const { data, error } = await supabase
                .from('articles')
                .select('*')
                .eq('category', categoryName);

            const container = document.getElementById('catResults');
            if (error || data.length === 0) {
                container.innerHTML = '<p>Belum ada tokoh di kategori ini.</p>';
                return;
            }

            // Render hasil
            data.forEach(art => {
                container.innerHTML += `
                    <div style="background: #002347; padding: 20px; border-left: 5px solid #cc0000;">
                        <h3 style="color: white;">${art.title}</h3>
                        <a href="article.html?slug=${art.slug}" style="color: #ff4d4d; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px;">BACA DETAIL →</a>
                    </div>
                `;
            });
        }
        loadCategory();
    </script>
</body>
</html>
